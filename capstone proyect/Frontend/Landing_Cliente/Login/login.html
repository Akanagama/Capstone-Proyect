<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Kial chicken</title>
    <link rel="stylesheet" href="login.css">
</head>
<body>

    <div class="login-card">
        <h2>🍗 Ingreso al Sistema</h2>
        <div class="input-group">
            <label>Usuario:</label>
            <input type="text" id="user" placeholder="Escribe usuario'">
        </div>
        <div class="input-group">
            <label>Contraseña:</label>
            <input type="password" id="pass" placeholder="Escribe la contraseña">
        </div>
        
        <button class="btn-login" onclick="iniciarSesion()">Ingresar</button>
        
        <p class="demo-text">Para la expo: Usa <b>admin</b> o <b>arturo</b>. Clave: <b>123</b></p>
    </div>

    <script src="login.js"></script>

</body>
</html>
