<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión | Kial Chicken</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="login.css">
</head>
<body>

    <div class="login-container">
        <div class="login-header">
            <h1>Kial Chicken</h1>
            <p>Sistema Integral de Gestión (POS & BI)</p>
        </div>

        <!-- Al presionar el botón se dispara la función de login.js -->
        <form id="form-login">
            <div class="input-group">
                <label for="input-usuario">Usuario de Acceso:</label>
                <input type="text" id="input-usuario" placeholder="Ej. admin o arturo" required autocomplete="username">
            </div>

            <div class="input-group">
                <label for="input-password">Contraseña:</label>
                <input type="password" id="input-password" placeholder="••••••••" required autocomplete="current-password">
            </div>

            <button type="submit" class="btn-ingresar">🚀 Ingresar al Sistema</button>
        </form>

        <div class="login-footer">
            <!-- Ruta relativa corregida según tu árbol para regresar a la Landing -->
            <a href="../index.html">⬅️ Volver a la Landing de Clientes</a>
        </div>
    </div>

    <!-- Vinculación nativa con tu archivo JS de la misma carpeta -->
    <script src="login.js"></script>
</body>
</html>
